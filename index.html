<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Age Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-neutral-900 to-emerald-950 font-sans min-h-screen flex items-center justify-center antialiased p-4">

<main class="w-full max-w-md">
    <div class="bg-neutral-900/80 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-neutral-800 ring-1 ring-white/5">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">
                Age Calculator
            </h1>
            <p class="text-neutral-400 text-sm mt-1">Discover your exact lifetime timeline</p>
        </div>
        
        <div class="mb-6">
            <label for="birthdate" class="block text-sm font-medium text-neutral-300 mb-2 cursor-pointer transition-colors hover:text-emerald-400">
                Enter your birthdate
            </label>
            <input 
                id="birthdate" 
                type="date" 
                class="w-full p-3 bg-neutral-950/60 border border-neutral-800 text-neutral-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all cursor-pointer placeholder-neutral-600 scheme-dark"
            >
        </div>
        
        <button 
            id="submit" 
            class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-neutral-950 font-semibold p-3 rounded-xl cursor-pointer transition-all duration-300 transform active:scale-98 shadow-lg shadow-emerald-950/40"
        >
            Calculate Age
        </button>
        
        <div id="result-box" class="hidden mt-6 p-5 bg-neutral-950/40 border border-neutral-800/60 rounded-xl transition-all duration-300 space-y-3">
            <p id="result" class="text-center text-base font-semibold leading-relaxed"></p>
            <div id="countdown-wrapper" class="border-t border-neutral-800/80 pt-3 hidden">
                <p id="countdown" class="text-center text-xs tracking-wide uppercase text-teal-400 font-medium"></p>
            </div>
        </div>
    </div>
</main>

<script src="./app.js"></script>
</body>
</html>
